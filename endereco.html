<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entope Veia - Endereço de Entrega</title>
    
    <!-- Link para a biblioteca de ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- CSS do Leaflet (Mapa Gratuito) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="resources/css/endereco.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar" id="global-sidebar" data-active-page="perfil"></aside>

        <main class="main-content">
            
            <div class="mobile-header-actions">
                <button class="btn-mobile-logout" onclick="window.location.href='login.html'">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Sair
                </button>
            </div>

            <h2 class="page-title">ENDEREÇO DE ENTREGA</h2>

            <div class="delivery-grid">
                
                <div class="delivery-left">
                    
                    <div class="map-wrapper">
                        <div class="search-bar-container">
                            <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input type="text" id="address-search" placeholder="Buscar novo endereço (Pressione Enter)..." onkeydown="searchAddress(event)">
                        </div>
                        <!-- Container do Mapa -->
                        <div id="map"></div>
                    </div>

                    <section class="saved-addresses-section">
                        <h3>ENDEREÇOS SALVOS</h3>
                        <div class="address-list">
                            
                            <!-- Coordenadas ajustadas para Porto Alegre -->
                            <div class="address-card" onclick="selectSavedAddress(-30.0384, -51.2215, 'Casa', 'Rua General Lima e Silva, 250 - Cidade Baixa')">
                                <div class="icon-box icon-home"><i class="fa-solid fa-house" style="color: white;"></i></div>
                                <div class="address-text">
                                    <h4>Casa</h4>
                                    <p>Rua Gen. Lima e Silva, 250 - Cidade Baixa</p>
                                </div>
                            </div>

                            <div class="address-card" onclick="selectSavedAddress(-30.0275, -51.2275, 'Trabalho', 'Av. Borges de Medeiros, 456 - Centro Histórico')">
                                <div class="icon-box icon-work"><i class="fa-solid fa-briefcase" style="color: white;"></i></div>
                                <div class="address-text">
                                    <h4>Trabalho</h4>
                                    <p>Av. Borges de Medeiros, 456 - Centro Histórico</p>
                                </div>
                            </div>

                            <div class="address-card" onclick="selectSavedAddress(-30.0232, -51.2012, 'Namorada', 'Rua Padre Chagas, 120 - Moinhos de Vento')">
                                <div class="icon-box icon-love"><i class="fa-solid fa-heart" style="color: white;"></i></div>
                                <div class="address-text">
                                    <h4>Namorada</h4>
                                    <p>Rua Padre Chagas, 120 - Moinhos de Vento</p>
                                </div>
                            </div>

                        </div>
                    </section>

                </div>

                <div class="delivery-right">
                    
                    <div class="selection-box">
                        <span class="box-label">LOCAL SELECIONADO:</span>
                        <p id="selected-address-display">Av. Borges de Medeiros, 456 - Centro Histórico, Porto Alegre - RS</p>
                    </div>

                    <button class="btn-confirm-location" onclick="confirmLocation()">
                        CONFIRMAR LOCALIZAÇÃO
                    </button>

                </div>

            </div>

            <footer id="global-endereco-footer"></footer>

        </main>

    </div>

    <!-- Script do Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializa o mapa focado em Porto Alegre (Centro Histórico)
        const map = L.map('map').setView([-30.0275, -51.2275], 14);

        // Renderiza camadas do Google Maps (Básico/Claro)
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 19,
            attribution: '© Google Maps'
        }).addTo(map);

        // Ícone personalizado amarelo
        const customIcon = L.icon({
            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/yellow-dot.png',
            iconSize: [38, 38],
            iconAnchor: [19, 38],
            popupAnchor: [0, -34]
        });

        // Adiciona marcador arrastável em POA
        const marker = L.marker([-30.0275, -51.2275], { icon: customIcon, draggable: true }).addTo(map);
        marker.bindPopup("<b>Entregar Aqui</b>").openPopup();

        // Evento ao arrastar o pino
        marker.on('dragend', function (e) {
            const position = marker.getLatLng();
            updateAddressDisplay(position.lat, position.lng);
        });

        // Evento ao clicar no mapa
        map.on('click', function (e) {
            marker.setLatLng(e.latlng);
            updateAddressDisplay(e.latlng.lat, e.latlng.lng);
        });

        // Atualização de texto na tela
        function updateAddressDisplay(lat, lng) {
            document.getElementById('selected-address-display').innerText = `Coordenadas selecionadas: Lat ${lat.toFixed(4)}, Lng ${lng.toFixed(4)} (Buscando endereço exato...)`;
        }

        // Função ao clicar em um endereço salvo
        function selectSavedAddress(lat, lng, label, address) {
            const latLng = new L.LatLng(lat, lng);
            map.panTo(latLng);
            marker.setLatLng(latLng);
            document.getElementById('selected-address-display').innerText = `${label}: ${address}`;
        }

        // Busca básica
        function searchAddress(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('address-search').value;
                if(query.trim() !== "") {
                    alert(`Simulando busca para: "${query}".`);
                }
            }
        }

        function confirmLocation() {
            const address = document.getElementById('selected-address-display').innerText;
            alert(`Localização confirmada!\n${address}`);
        }
    </script>
    <script src="resources/js/components.js"></script>
</body>
</html>

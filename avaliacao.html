<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entope Veia - Avaliar Pedido</title>
    <link rel="stylesheet" href="resources/css/avaliacao.css">
    <!-- Link do Font Awesome (Banco de Ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar" id="global-sidebar" data-active-page="pedidos"></aside>
        

        <main class="main-content">
            
            <h2 class="page-title">AVALIAR PEDIDO</h2>

            <div class="dashboard-grid">
                
                <section class="review-form-column">
                    
                    <div class="product-summary-card">
                        <!-- Imagem convertida para a tag <img> com texto alternativo (alt) -->
                        <img 
                            src="resources/img/o_entupidor.jpeg" 
                            alt="Lanche X-Infarto Duplo com hambúrguer artesanal e queijo derretido" 
                            class="product-thumb"
                            loading="lazy"
                        >
                        
                        <div class="product-details">
                            <span class="order-number">PEDIDO #4829</span>
                            <h3>O Entupidor</h3>
                            <p class="order-items">O Entupidor, Fritas do Além, Soda Cáustica</p>
                        </div>
                    </div>

                    <div class="rating-questions-card">
    
                        <div class="question-group" id="rating-food">
                            <p class="question-label">O que achou do banquete?</p>
                            <div class="rating-icons">
                                <i class="fa-solid fa-fire icon" data-value="1"></i>
                                <i class="fa-solid fa-fire icon" data-value="2"></i>
                                <i class="fa-solid fa-fire icon" data-value="3"></i>
                                <i class="fa-solid fa-fire icon" data-value="4"></i>
                                <i class="fa-solid fa-fire icon" data-value="5"></i>
                                <i class="fa-solid fa-fire icon" data-value="6"></i>
                            </div>
                        </div>

                        <div class="question-group" id="rating-delivery">
                            <p class="question-label">A entrega foi rápida?</p>
                            <div class="rating-icons">
                                <i class="fa-solid fa-bolt icon" data-value="1"></i>
                                <i class="fa-solid fa-bolt icon" data-value="2"></i>
                                <i class="fa-solid fa-bolt icon" data-value="3"></i>
                                <i class="fa-solid fa-bolt icon" data-value="4"></i>
                                <i class="fa-solid fa-bolt icon" data-value="5"></i>
                                <i class="fa-solid fa-bolt icon" data-value="6"></i>
                            </div>
                        </div>

                        <div class="comment-group">
                            <label class="question-label" for="comments">COMENTÁRIOS</label>
                            <textarea id="comments" placeholder="Conte o que achou da gordice..."></textarea>
                        </div>

                        <button class="btn-submit-review" style="margin-top: 20px; width: 100%;" onclick="submitReview()">ENVIAR AVALIAÇÃO</button>

                    </div>

                </section>

                <section class="action-column">
                    
                    <div class="photo-upload-card">
                        <p class="upload-title">GORDICE NA TELA</p>
                        
                        <div class="uploaded-preview-box">
                            <!-- Uso da tag <img> para SEO. Substitua o 'src' pelo caminho da sua pasta -->
                            <img 
                                src="resources/img/o_entupidor.jpeg" 
                                alt="Foto do lanche X-Infarto Duplo com fritas e refrigerante na bandeja" 
                                class="preview-img"
                                loading="lazy"
                            >
                        </div>
    
    <button class="btn-change-photo">TROCAR FOTO</button>
</div>

                </section>

            </div>

            <footer id="global-avaliacao-footer"></footer>

        </main>

    </div>
    <script src="resources/js/components.js"></script>
    <script>
    // Variáveis para guardar as notas do usuário
    let payloadAvaliacao = {
        notaBanquete: 0,
        notaEntrega: 0,
        comentario: ""
    };

    // Função universal para gerenciar os cliques nos ícones
    function setupRatings(groupId, propriedadePayload) {
        const group = document.getElementById(groupId);
        const icons = group.querySelectorAll('.icon');

        icons.forEach(icon => {
            icon.addEventListener('click', function() {
                const value = parseInt(this.getAttribute('data-value'));
                
                // Salva a nota no nosso objeto payload
                payloadAvaliacao[propriedadePayload] = value;

                // Atualiza a interface visualmente
                icons.forEach(i => {
                    const iconValue = parseInt(i.getAttribute('data-value'));
                    if (iconValue <= value) {
                        i.classList.add('active'); // Pinta o atual e os anteriores
                    } else {
                        i.classList.remove('active'); // Despinta os próximos
                    }
                });
            });
        });
    }

    // Inicializa as interações nas duas perguntas
    setupRatings('rating-food', 'notaBanquete');
    setupRatings('rating-delivery', 'notaEntrega');

    // Função de disparo do botão
    function submitReview() {
        // Captura o comentário no momento do clique
        payloadAvaliacao.comentario = document.getElementById('comments').value;

        // Validação básica
        if (payloadAvaliacao.notaBanquete === 0 || payloadAvaliacao.notaEntrega === 0) {
            alert("Ei! Por favor, dê uma nota para o banquete e para a entrega antes de enviar.");
            return;
        }
  
    }
</script>
</body>
</html>

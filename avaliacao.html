<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entope Veia - Avaliar Pedido</title>
    <link rel="stylesheet" href="resources/css/avaliacao.css">
    <!-- Link do Font Awesome (Banco de Ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar" id="global-sidebar" data-active-page="pedidos"></aside>
        

        <main class="main-content">
            
            <h2 class="page-title">AVALIAR PEDIDO</h2>

            <div class="dashboard-grid">
                
                <section class="review-form-column">
                    
                    <div class="product-summary-card">
                        <!-- Imagem convertida para a tag <img> com texto alternativo (alt) -->
                        <img 
                            src="resources/img/o_entupidor.jpeg" 
                            alt="Lanche X-Infarto Duplo com hambúrguer artesanal e queijo derretido" 
                            class="product-thumb"
                            loading="lazy"
                        >
                        
                        <div class="product-details">
                            <span class="order-number">PEDIDO #4829</span>
                            <h3>X-INFARTO DUPLO</h3>
                            <p class="order-items">X-Infarto Duplo, Fritas do Além, Soda Cáustica</p>
                        </div>
                    </div>

                    <div class="rating-questions-card">
                        
                        <div class="question-group">
                            <p class="question-label">O que achou do banquete?</p>
                            <div class="rating-icons">
                                <i class="fa-solid fa-fire icon "></i>
                                <i class="fa-solid fa-fire icon "></i>
                                <i class="fa-solid fa-fire icon "></i>
                                <i class="fa-solid fa-fire icon "></i>
                                <i class="fa-solid fa-fire icon "></i>
                            </div>
                        </div>

                        <div class="question-group">
                            <p class="question-label">A entrega foi rápida?</p>
                            <div class="rating-icons">
                                <i class="fa-solid fa-bolt icon "></i>
                                <i class="fa-solid fa-bolt icon "></i>
                                <i class="fa-solid fa-bolt icon "></i>
                                <i class="fa-solid fa-bolt icon "></i>
                                <i class="fa-solid fa-bolt icon "></i>
                            </div>
                        </div>

                        <div class="comment-group">
                            <label class="question-label" for="comments">COMENTÁRIOS</label>
                            <textarea id="comments" placeholder="Conte o que achou da gordice..."></textarea>
                        </div>

                    </div>

                </section>

                <section class="action-column">
                    
                    <div class="photo-upload-card">
                        <p class="upload-title">GORDICE NA TELA</p>
                        
                        <div class="uploaded-preview-box">
                            <!-- Uso da tag <img> para SEO. Substitua o 'src' pelo caminho da sua pasta -->
                            <img 
                                src="resources/img/o_entupidor.jpeg" 
                                alt="Foto do lanche X-Infarto Duplo com fritas e refrigerante na bandeja" 
                                class="preview-img"
                                loading="lazy"
                            >
                        </div>
    
    <button class="btn-change-photo">TROCAR FOTO</button>
</div>

                </section>

            </div>

            <footer id="global-avaliacao-footer"></footer>

        </main>

    </div>
    <script src="resources/js/components.js"></script>
</body>
</html>
